<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Физична Симулация</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { 
            --car-red: #d63031; 
            --window-blue: #81ecec; 
            --base-scale: 1.1vw; 
        }
        
        body { 
            margin: 0; 
            font-family: 'Arial', sans-serif; 
            background: #99d9ea; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            height: 100%;
            font-size: var(--base-scale); 
        }

        .controls {
            top: 0.5em;
            position: absolute;
            display: flex;
            gap: 2em;
            background: rgba(255, 255, 255, 0.9);
            padding: 0.5em 1.5em;
            border: 0.15em solid #000000;
            border-radius: 0.5em;
            z-index: 100;
            font-size: 0.8em; 
        }

        .control-group { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-weight: bold; 
        }

        .scene { 
            width: 100%; 
            height: 28.6vw; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
        }

        .ground { 
            height: 30%; 
            background: #e9d1af; 
            border-top: 0.25em solid #000000; 
            width: 100%; 
            z-index: 1;
        }

    

        .simulation-wrapper {
            position: absolute; 
            bottom: 30%; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; 
            padding: 0 2em; 
            box-sizing: border-box; 
            z-index: 2; 
            transform: translateY(0.3em);
        }

        .car {
            width: 7em; 
            height: 4em; 
            position: relative; 
            flex-shrink: 0; 
            margin-bottom: -0.2em;
            animation: doodleFrame 0.1s infinite;
        }

        .car-body { 
            position: absolute; 
            bottom: 1em; 
            width: 6.8em; 
            height: 1.5em; 
            background: var(--car-red); 
            border: 0.15em solid #000000; 
            border-radius: 0.4em 1em 0.25em 0.25em; 
        }

        .car-roof { 
            position: absolute;
            top: 0.25em; 
            left: 1em; 
            width: 4.2em;
            height: 1.5em; 
            background: var(--car-red); 
            border: 0.15em solid #000000; 
            border-bottom: none; 
            border-radius: 1em 1.5em 0 0; 
            display: flex; 
            padding: 0.25em; 
            box-sizing: border-box; 
            gap: 0.25em; 
        }

        .window { 
            flex: 1; 
            background: var(--window-blue); 
            border: 0.1em solid #000000; 
            border-radius: 0.25em 0.25em 0 0; 
        }

        .wheel { 
            position: absolute; 
            bottom: 0.25em; 
            width: 1.25em; 
            height: 1.25em; 
            background: #2d3436;
            border: 0.15em solid #000000; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .wheel::after { 
            content: ''; 
            width: 0.7em; height: 0.7em; 
            border: 0.1em solid #fff; 
            border-radius: 50%; 
            border-style: dotted; 
        }

        .wheel.back { left: 0.75em; }
        .wheel.front { right: 0.75em; }

        @keyframes doodleFrame {            
            0% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(0.05em, 0.05em) rotate(0.2deg); }
            50% { transform: translate(-0.05em, 0px) rotate(-0.2deg); }
            75% { transform: translate(0px, -0.05em) rotate(0.1deg); }
        }

        .gap-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0 1em; 
            position: relative;
        }

        .arrow { 
            height: 0.4em; 
            background: #000; 
            width: 100%; 
            position: relative; 
        }

        .arrow::before, .arrow::after { 
            content: ''; 
            position: absolute; 
            top: -0.5em; 
            width: 0; 
            height: 0; 
            border-top: 0.7em solid transparent; 
            border-bottom: 0.7em solid transparent; 
        }

        .arrow::before { 
            left: -0.9em; 
            border-right: 1.1em solid #000000; 
        }

        .arrow::after { 
            right: -0.9em; 
            border-left: 1.1em solid #000000; 
        }
        
        .label { 
            font-size: 1.5em; 
            font-weight: 900; 
            font-style: italic; 
            font-family: 'Arial Black', sans-serif;
        }

        .label-s { 
            margin-bottom: 0.5em; 
        }

        .label-t { 
            margin-bottom: 0.2em; 
            font-size: 1.2em; 
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="control-group">
            <label>Скорост: <span id="val-s">5</span>m/s</label>
            <input type="range" id="input-s" min="1" max="20" value="5">
        </div>
        <div class="control-group">
            <label>Разстояние: <span id="val-m">60</span>m</label>
            <input type="range" id="input-m" min="1" max="150" value="60">
        </div>
    </div>

    <div class="scene">
        <div class="simulation-wrapper" id="wrapper"></div>
        <div class="ground"></div>
    </div>

    <script>
        const wrapper = document.getElementById('wrapper');
        const inputV = document.getElementById('input-s'); 
        const inputS = document.getElementById('input-m');

        function createCarHTML() {
            return `
                <div class="car">
                    <div class="car-roof"><div class="window"></div><div class="window"></div></div>
                    <div class="car-body"></div>
                    <div class="wheel back"></div>
                    <div class="wheel front"></div>
                </div>`;
        }

        function createGapHTML() {
            return `
                <div class="gap-container">
                    <div class="label label-t">0s</div> 
                    <div class="arrow"></div>
                    <div class="label label-s">0m</div> 
                </div>`;
        }         

        let content = createCarHTML();
        for(let i=0; i<3; i++) content += createGapHTML() + createCarHTML();
        wrapper.innerHTML = content;        

        function update() {
            const v = parseFloat(inputV.value); 
            const s = parseFloat(inputS.value); 
            const t = (s / v).toFixed(1); 

            document.getElementById('val-s').innerText = v;
            document.getElementById('val-m').innerText = s; 

            const baseGapWidth = (s / 150) * 7; 

            gsap.to(".gap-container", {                
                width: baseGapWidth + "em",
                duration: 0.1,
                ease: "sine.out"
            });

            document.querySelectorAll('.label-t').forEach(el => 
                el.innerHTML = `${t}<sub>s</sub>`
            );

            document.querySelectorAll('.label-s').forEach(el => 
                el.innerHTML = `${s}<sub>m</sub>`
            );
        }

        inputV.addEventListener('input', update);
        inputS.addEventListener('input', update);
        update();
    </script>
</body>
</html>
