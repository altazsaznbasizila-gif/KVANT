<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Равнозакъснително Движение - Спирачен Път</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
:root {
    --car-red: #d63031;
    --window-blue: #81ecec;
    --dynamic-scale: 1;
}

body,
html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: 'Arial', sans-serif;
    background: #99d9ea;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: calc(1.1vw * var(--dynamic-scale));
}

.controls {
    top: 0.5em;
    position: absolute;
    display: flex;
    gap: 2em;
    background: rgba(255, 255, 255, 0.95);
    padding: 0.5em 1.5em;
    border: 0.15em solid #000000;
    border-radius: 0.5em;
    z-index: 100;
    font-size: 0.9em;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-weight: bold;
}

.scene {
    width: 100%;
    height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
}

.ground {
    height: 20%;
    background: #e9d1af;
    border-top: 0.25em solid #000000;
    width: 100%;
    z-index: 1;
}

.simulation-wrapper {
    position: absolute;
    bottom: 20%;
    width: 100%;
    display: flex;
    justify-content: flex-start;
    align-items: flex-end;
    padding: 0 5em;
    box-sizing: border-box;
    z-index: 2;
    transform: translateY(0.3em);
    overflow: visible;
}

.formula-board {
    position: absolute;
    bottom: 6.5em;
    left: 0;
    background: white;
    border: 0.15em solid black;
    padding: 1em;
    border-radius: 0.5em;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    box-shadow: 0.3em 0.3em 0 rgba(0, 0, 0, 0.1);
    min-width: 22em;
    white-space: nowrap;
    pointer-events: none;
}

.formula-board div {
    margin-bottom: 0.4em;
    line-height: 1.2;
}

.car-container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.car {
    width: 7em;
    height: 4em;
    position: relative;
    flex-shrink: 0;
    margin-bottom: -0.2em;
}

.car-body {
    position: absolute;
    bottom: 1em;
    width: 6.8em;
    height: 1.5em;
    background: var(--car-red);
    border: 0.15em solid #000000;
    border-radius: 0.4em 1em 0.25em 0.25em;
}

.car-roof {
    position: absolute;
    top: 0.25em;
    left: 1em;
    width: 4.2em;
    height: 1.5em;
    background: var(--car-red);
    border: 0.15em solid #000000;
    border-bottom: none;
    border-radius: 1em 1.5em 0 0;
    display: flex;
    padding: 0.25em;
    box-sizing: border-box;
    gap: 0.25em;
}

.window {
    flex: 1;
    background: var(--window-blue);
    border: 0.1em solid #000000;
    border-radius: 0.25em 0.25em 0 0;
}

.wheel {
    position: absolute;
    bottom: 0.25em;
    width: 1.25em;
    height: 1.25em;
    background: #2d3436;
    border: 0.15em solid #000000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.wheel-spoke {
    position: absolute;
    width: 100%;
    height: 0.15em;
    background: #95a5a6;
}

.wheel-spoke:nth-child(2) {
    transform: rotate(90deg);
}

.wheel.back {
    left: 0.75em;
}

.wheel.front {
    right: 0.75em;
}

.gap-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    height: 7.5em;
    min-width: 1em;
    flex-shrink: 0;
    justify-content: flex-end;
}

.arrow {
    height: 0.4em;
    background: #000;
    width: 100%;
    position: relative;
    margin-top: 0.8em;
    margin-bottom: 0.5em;
}

.arrow::before {
    content: '';
    position: absolute;
    left: -0.5em;
    top: -0.5em;
    border-top: 0.7em solid transparent;
    border-bottom: 0.7em solid transparent;
    border-right: 0.8em solid #000;
}

.arrow::after {
    content: '';
    position: absolute;
    right: -0.5em;
    top: -0.5em;
    border-top: 0.7em solid transparent;
    border-bottom: 0.7em solid transparent;
    border-left: 0.8em solid #000;
}

.label-s {
    font-size: 1.2em;
    font-weight: 900;
    white-space: nowrap;
    background: rgba(255, 255, 255, 0.8);
    padding: 0.2em 0.6em;
    border-radius: 0.4em;
    border: 0.1em solid black;
}

.stop-indicator {
    position: absolute;
    bottom: 0.5em;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 5;
}

.stop-line {
    width: 0.2em;
    height: 14em;
    background: black;
    position: relative;
}

.stop-line::before,
.stop-line::after {
    content: '';
    position: absolute;
    left: -0.4em;
    border-left: 0.5em solid transparent;
    border-right: 0.5em solid transparent;
}

.stop-line::before {
    top: 0;
    border-bottom: 0.6em solid black;
}

.stop-line::after {
    bottom: 0;
    border-top: 0.6em solid black;
}

.stop-text {
    font-size: 1.5em;
    font-weight: 900;
    margin-bottom: 0.2em;
    white-space: nowrap;
}
    </style>
</head>
<body>

    <div class="controls">
        <div class="control-group">
            <label>Ускорение (a): <span id="val-a">2</span>m/s²</label>
            <input type="range" id="input-a" min="0.5" max="10" step="0.5" value="2">
        </div>
        <div class="control-group">
            <label>Нач. скорост (v₀): <span id="val-vo">20</span>m/s</label>
            <input type="range" id="input-vo" min="5" max="50" value="20">
        </div>
        <div class="control-group">
            <label>Време (t): <span id="val-t">5</span>s</label>
            <input type="range" id="input-t" min="1" max="25" value="5">
        </div>
    </div>

    <div class="scene">
        <div class="simulation-wrapper">
            <div class="car-container">
                <div class="formula-board" id="formula-display"></div>
                <div id="car-1" class="car">
                    <div class="car-roof"><div class="window"></div><div class="window"></div></div>
                    <div class="car-body"></div>
                    <div class="wheel back"><div class="wheel-spoke"></div><div class="wheel-spoke"></div></div>
                    <div class="wheel front"><div class="wheel-spoke"></div><div class="wheel-spoke"></div></div>
                </div>
            </div>
            <div class="gap-container" id="gap">
                <div class="label-s"></div> 
                <div class="arrow"></div>
            </div>
            <div class="car-container">
                <div class="stop-indicator">
                    <div class="stop-text">v = 0 m/s</div>
                    <div class="stop-line"></div>
                </div>
                <div id="car-2" class="car">
                    <div class="car-roof"><div class="window"></div><div class="window"></div></div>
                    <div class="car-body"></div>
                    <div class="wheel back"><div class="wheel-spoke"></div><div class="wheel-spoke"></div></div>
                    <div class="wheel front"><div class="wheel-spoke"></div><div class="wheel-spoke"></div></div>
                </div>
            </div>
        </div>
        <div class="ground"></div>
    </div>

    <script>
        const inputA = document.getElementById('input-a');
        const inputVo = document.getElementById('input-vo');
        const inputT = document.getElementById('input-t');
        const formulaDisplay = document.getElementById('formula-display');
        const car1 = document.getElementById('car-1');
        const wheels1 = car1.querySelectorAll('.wheel');

        function update() {
            let v0 = parseFloat(inputVo.value); 
            let a = parseFloat(inputA.value);
            let t_user = parseFloat(inputT.value);

            let t_stop = v0 / a;
            let isFullStop = t_user >= t_stop;
            
            let t_calc = isFullStop ? t_stop : t_user;
            let vFinal = (v0 - (a * t_calc)).toFixed(1);
            let s = (v0 * t_calc - (0.5 * a * Math.pow(t_calc, 2))).toFixed(1);

            document.getElementById('val-a').innerText = a;
            document.getElementById('val-vo').innerText = v0;
            document.getElementById('val-t').innerText = t_user;

            if (isFullStop) {
                formulaDisplay.innerHTML = `
                    <div style="color: #d63031;">Автомобилът е спрял!</div>
                    <div>v = 0.0 m/s</div>
                    <hr style="border:none; border-top:0.1em solid #ddd; margin: 0.5em 0;">
                    <div>Спирачен път (s<sub>сп</sub>):</div>
                    <div>s = v₀² / 2a = ${v0}² / (2·${a}) = ${s} m</div>
                `;
            } else {
                formulaDisplay.innerHTML = `
                    <div>v = v₀ - a·t</div>
                    <div>v = ${v0} - ${a}·${t_user} = ${vFinal} m/s</div>
                    <hr style="border:none; border-top:0.1em solid #ddd; margin: 0.5em 0;">
                    <div>s = v₀·t - ½·a·t²</div>
                    <div>s = ${v0}·${t_user} - ½·${a}·${t_user}² = ${s} m</div>
                `;
            }

            const visualGap = Math.min(Math.max(2, s * 0.1), 45); 
            gsap.to("#gap", { width: visualGap + "em", duration: 0.1, ease: "none" });
            document.querySelector('.label-s').innerHTML = `Δs = ${s}m`;

            gsap.to(car1, { 
                y: Math.min(v0/8, 2.5), 
                x: Math.min(v0/15, 1.2), 
                duration: 0.04, repeat: -1, yoyo: true 
            });

            const speed1 = Math.max(0.02, 0.6 - (v0 / 70));
            gsap.to(wheels1, { rotation: 360, duration: speed1, repeat: -1, ease: "none" });
        }

        function handleResize() {
            const baseWidth = 1000; 
            const currentWidth = window.innerWidth;
            const scale = Math.min(currentWidth / baseWidth, 1.1); 
            document.documentElement.style.setProperty('--dynamic-scale', scale);
        }

        window.addEventListener('resize', handleResize);
        [inputVo, inputT, inputA].forEach(el => el.addEventListener('input', update));

        handleResize();
        update();
    </script>
</body>
</html>
