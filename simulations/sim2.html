<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Физична Симулация - Оправно Тяло</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: #99d9ea;
            overflow: hidden;
            font-size: 3.5vmin; 
        }

        .scene {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 25%;
            background: #e9d1af;
            border-top: 0.25em solid #000;
            z-index: 1;
        }

        .bubble {
            position: absolute;
            background: white;
            border: 0.2em solid #000;
            padding: 0.5em;
            border-radius: 0.5em;
            font-weight: bold;
            font-size: 0.85em;
            pointer-events: none;
            opacity: 0;
            z-index: 100;
            box-shadow: 0.25em 0.25em 0em #000;
            white-space: normal;
            width: 85%;
            left: 5%;
            top: 2%;
        }

        .character, .character2 {
            position: absolute;
            cursor: grab;
            user-select: none;
            z-index: 10;
        }

        .stickman {
            width: 3.5em;
            height: 8em;
            position: relative;
        }

        .head {
            width: 2em;
            height: 2em;
            border: 0.25em solid #000;
            border-radius: 50%;
            position: absolute;
            left: 0.75em;
            top: 0;
            background: #99d9ea;
        }

        .torso {
            width: 0.25em;
            height: 3em;
            background: #000;
            position: absolute;
            left: 1.625em;
            top: 2.25em;
        }

        .arm {
            width: 2em;
            height: 0.25em;
            background: #000;
            position: absolute;
            top: 3em;
            transform-origin: left center;
        }

        .arm.left { left: 1.625em; transform: rotate(150deg); }
        .arm.right { left: 1.75em; transform: rotate(30deg); }

        .leg {
            width: 0.25em;
            height: 2.5em;
            background: #000;
            position: absolute;
            top: 5.25em;
            transform-origin: top center;
        }

        .leg.l1 { left: 1.625em; transform: rotate(20deg); }
        .leg.l2 { left: 1.625em; transform: rotate(-20deg); }

        .skateboard {
            width: 6em;
            height: 0.8em;
            background: #ff4757;
            border: 0.2em solid #000;
            border-radius: 1.25em 1.25em 0.3em 0.3em;
            position: absolute;
            bottom: -0.3em;
            left: -1.25em;
        }

        .skate-wheel {
            width: 0.8em;
            height: 0.8em;
            background: #fff;
            border: 0.125em solid #000;
            border-radius: 50%;
            position: absolute;
            bottom: -0.6em;
        }
        .skate-wheel.w1 { left: 0.9em; }
        .skate-wheel.w2 { right: 0.9em; }

        .label-id {
            position: absolute;
            font-weight: 900;
            font-size: 1.1em;
            font-family: 'Arial Black';
        }

        .moving .head, .moving .torso, .moving .arm { animation: jitter 0.1s infinite; }
        @keyframes jitter {
            0% { transform: translate(0, 0); }
            50% { transform: translate(0.02em, -0.02em); }
            100% { transform: translate(-0.02em, 0.02em); }
        }
    </style>
</head>

<body>
    <div class="scene">
        <div id="bubble-skater" class="bubble">
            Ако (2) е отправно, (1) се движи.<br>
            Ако (3) е отправно, (1) не се движи.
        </div>

        <div id="bubble-walker" class="bubble">
            Ако (1) е отправно, (2) се движи.<br>
            Ако (3) е отправно, (2) се движи.
        </div>

        <div class="character" id="skater-group" style="left: 5%; bottom: 25%;">
            <span class="label-id" style="right: -1.8em; top: 0;">(1)</span>
            <div class="stickman">
                <div class="head"></div>
                <div class="torso"></div>
                <div class="arm left"></div>
                <div class="arm right"></div>
                <div class="leg l1"></div>
                <div class="leg l2"></div>
            </div>
            <div class="skateboard">
                <span class="label-id" style="right: -1.5em; top: -2em;">(3)</span>
                <div class="skate-wheel w1"></div>
                <div class="skate-wheel w2"></div>
            </div>
        </div>

        <div class="character2" id="walker-group" style="left: 55%; bottom: 25%;">
            <span class="label-id" style="right: -1.8em; top: 0;">(2)</span>
            <div class="stickman">
                <div class="head"></div>
                <div class="torso"></div>
                <div class="arm left"></div>
                <div class="arm right"></div>
                <div class="leg l1"></div>
                <div class="leg l2"></div>
            </div>
        </div>

        <div class="ground"></div>
    </div>

    <script>
        gsap.registerPlugin(Draggable);

        const bubbleSkater = document.getElementById('bubble-skater');
        const bubbleWalker = document.getElementById('bubble-walker');

        Draggable.create("#skater-group", {
            type: "x",
            bounds: ".scene",
            onDragStart: function () {
                this.target.classList.add('moving');
                gsap.to(bubbleSkater, { opacity: 1, duration: 0.2 });
            },
            onDragEnd: function () {
                this.target.classList.remove('moving');
                gsap.to(bubbleSkater, { opacity: 0, duration: 0.2 });
            }
        });

        Draggable.create("#walker-group", {
            type: "x",
            bounds: ".scene",
            onDragStart: function () {
                this.target.classList.add('moving');
                gsap.to(bubbleWalker, { opacity: 1, duration: 0.2 });
            },
            onDragEnd: function () {
                this.target.classList.remove('moving');
                gsap.to(bubbleWalker, { opacity: 0, duration: 0.2 });
            }
        });
    </script>
</body>
</html>
